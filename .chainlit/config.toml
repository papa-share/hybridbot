[project]
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
allow_origins = ["http://localhost:8000", "http://127.0.0.1:8000"]

[features]
unsafe_allow_html = false
latex = false
auto_tag_thread = true
edit_message = true
favorites = true
allow_thread_sharing = true

# max_files / max_size_mb = limite UI ; re-validation serveur via MAX_* dans .env
[features.spontaneous_file_upload]
enabled = true
accept = { "image/*" = [], "application/pdf" = [], "text/markdown" = [], "text/plain" = [] }
max_files = 5
max_size_mb = 50

[UI]
name = "OllamaHybridBot"
language = "fr-FR"
cot = "full"
logo_file_url = "/public/logo_pbn.png?v=14"
custom_meta_image_url = "/public/logo_pbn.png?v=14"
login_page_image = "/public/logo_pbn.png?v=14"
login_page_image_filter = ""
login_page_image_dark_filter = "brightness-90"
custom_css = "/public/web.css?v=14"
custom_js = "/public/readme.js"
show_chainlit_footer = false

[meta]
generated_by = "2.9.6"
