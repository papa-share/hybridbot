services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chainlit
      POSTGRES_PASSWORD: chainlit
      POSTGRES_DB: chainlit
    ports:
      - "5432:5432"
    volumes:
      - chainlit_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainlit -d chainlit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chainlit_pg:
