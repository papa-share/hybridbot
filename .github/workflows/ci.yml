name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run ruff (lint)
        run: ruff check src/ tests/
      
      - name: Check formatting with black
        run: black --check src/ tests/
      
      - name: Run pyright (type checking)
        run: pyright src/
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Test imports
        run: |
          python -c "from chatbot.config import config; print('config OK')"
          python -c "from chatbot.logger import logger; print('logger OK')"
          python -c "from chatbot.utils.validators import validate_uploaded_files; print('validators OK')"
          python -c "from chatbot.data.sqlite_layer import SQLiteDataLayer; print('data_layer OK')"
          python -c "from chatbot.core.llm import list_model_names; print('llm OK')"
      
      - name: Run tests
        run: pytest tests/ -v
